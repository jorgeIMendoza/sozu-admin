<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estado de Cuenta</title>
  <style>
    /* Reset */
    *{box-sizing:border-box; margin:0; padding:0}
    body{
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin:0;
      padding:32px;
      color:#1a1a2e;
      background:#fff;
      font-size:13px;
      line-height:1.5;
    }
    .card{
      background:#fff;
      max-width:800px;
      margin:0 auto;
      padding-bottom:40px;
    }

    /* Header */
    header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding-bottom:20px;
      border-bottom:2px solid #1a1a2e;
      margin-bottom:24px;
    }
    .company-info h1{
      font-size:22px;
      font-weight:700;
      color:#1a1a2e;
      margin-bottom:4px;
    }
    .company-info p{
      color:#666;
      font-size:12px;
    }

    .account-box{
      text-align:right;
    }
    .account-box .label{
      font-size:11px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }
    .account-box .account-number{
      font-size:20px;
      font-weight:700;
      color:#1a1a2e;
      margin:2px 0 8px;
    }
    .account-box .client-name{
      font-weight:600;
      color:#333;
    }
    .account-box .client-id{
      font-size:11px;
      color:#888;
    }

    /* Meta info row */
    .meta-row{
      display:flex;
      gap:16px;
      margin-bottom:20px;
    }
    .meta-item{
      background:#f8f9fa;
      padding:10px 14px;
      border-radius:6px;
      border-left:3px solid #1a1a2e;
    }
    .meta-item .label{
      font-size:10px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:0.3px;
    }
    .meta-item .value{
      font-weight:600;
      color:#1a1a2e;
      font-size:13px;
    }

    /* Summary cards */
    .summary{
      display:flex;
      gap:12px;
      margin-bottom:28px;
    }
    .summary-item{
      flex:1;
      background:#fff;
      border:1px solid #e5e7eb;
      padding:16px;
      border-radius:8px;
      text-align:center;
    }
    .summary-item.highlight{
      background:#1a1a2e;
      border-color:#1a1a2e;
    }
    .summary-item.highlight h3,
    .summary-item.highlight .amount{
      color:#fff;
    }
    .summary-item h3{
      font-size:11px;
      font-weight:500;
      color:#666;
      text-transform:uppercase;
      letter-spacing:0.3px;
      margin-bottom:6px;
    }
    .summary-item .amount{
      font-size:18px;
      font-weight:700;
      color:#1a1a2e;
    }

    /* Section titles */
    .section-title{
      font-size:14px;
      font-weight:700;
      color:#1a1a2e;
      margin-bottom:12px;
      padding-bottom:6px;
      border-bottom:1px solid #e5e7eb;
    }

    /* Tables */
    table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:24px;
    }
    thead th{
      background:#f8f9fa;
      text-align:left;
      padding:10px 8px;
      font-size:11px;
      font-weight:600;
      color:#555;
      text-transform:uppercase;
      letter-spacing:0.3px;
      border-bottom:2px solid #e5e7eb;
    }
    tbody td{
      padding:8px;
      border-bottom:1px solid #f0f0f0;
      font-size:12px;
      color:#333;
    }
    tbody tr:nth-child(even){
      background:#fafafa;
    }
    tbody tr:last-child td{
      border-bottom:none;
    }

    tfoot td{
      padding:12px 8px;
      font-weight:700;
      background:#f8f9fa;
      border-top:2px solid #e5e7eb;
    }

    .right{text-align:right}
    .center{text-align:center}

    .status-paid{
      display:inline-block;
      background:#dcfce7;
      color:#166534;
      padding:2px 8px;
      border-radius:4px;
      font-size:11px;
      font-weight:500;
    }
    .status-pending{
      display:inline-block;
      background:#fef3c7;
      color:#92400e;
      padding:2px 8px;
      border-radius:4px;
      font-size:11px;
      font-weight:500;
    }

    /* Footer */
    footer{
      margin-top:24px;
      padding-top:16px;
      border-top:1px solid #e5e7eb;
      font-size:11px;
      color:#888;
    }
    footer .notes-label{
      font-weight:600;
      color:#666;
      margin-bottom:4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="company-info">
        <h1 id="companyName"></h1>
        <p id="companyAddress"></p>
      </div>
      <div class="account-box">
        <div class="label">Cuenta</div>
        <div class="account-number" id="accountNumber"></div>
        <div class="client-name" id="clientName"></div>
        <div class="client-id" id="clientIdentifier"></div>
      </div>
    </header>

    <div class="meta-row">
      <div class="meta-item">
        <div class="label">Estado</div>
        <div class="value" id="accountStatus"></div>
      </div>
      <div class="meta-item">
        <div class="label">Periodo</div>
        <div class="value" id="period"></div>
      </div>
      <div class="meta-item">
        <div class="label">Fecha de Emisión</div>
        <div class="value" id="issueDate"></div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-item">
        <h3>Precio Final</h3>
        <div class="amount" id="precioFinal"></div>
      </div>
      <div class="summary-item">
        <h3>Total Pagado</h3>
        <div class="amount" id="totalPagado"></div>
      </div>
      <div class="summary-item">
        <h3>Multas</h3>
        <div class="amount" id="totalMultas"></div>
      </div>
      <div class="summary-item highlight">
        <h3>Saldo Pendiente</h3>
        <div class="amount" id="saldoPendiente"></div>
      </div>
    </div>

    <section>
      <h2 class="section-title">Acuerdos de Pago</h2>
      <table>
        <thead>
          <tr>
            <th class="center" style="width:50px">#</th>
            <th>Concepto</th>
            <th>Fecha Programada</th>
            <th class="right">Monto</th>
            <th class="right">Pagado</th>
            <th class="right">Pendiente</th>
            <th class="center">Estado</th>
          </tr>
        </thead>
        <tbody id="acuerdosTable">
        </tbody>
      </table>
    </section>

    <section>
      <h2 class="section-title">Pagos Realizados</h2>
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Método</th>
            <th>Referencia</th>
            <th class="right">Monto</th>
          </tr>
        </thead>
        <tbody id="pagosTable">
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3">Total Pagos</td>
            <td class="right" id="totalPagosFooter"></td>
          </tr>
        </tfoot>
      </table>
    </section>

    <footer>
      <div class="notes-label">Notas:</div>
      <div id="notes"></div>
    </footer>
  </div>
</body>
</html>
