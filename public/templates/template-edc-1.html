<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estado de Cuenta</title>
  <style>
    /* Reset */
    *{box-sizing:border-box}
    body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; padding:24px; color:#222; background:#f6f7f9}
    .card{background:#fff; border-radius:8px; padding:28px; max-width:900px; margin:0 auto; box-shadow:0 6px 18px rgba(18,22,34,0.06)}

    header{display:flex; gap:20px; align-items:center; margin-bottom:18px}
    .brand{width:260px}
    .brand svg{width:100%; height:auto; display:block}

    .company-info{flex:1}
    .company-info h1{font-size:20px; margin:0}
    .company-info p{margin:4px 0; color:#555}

    .meta{display:flex; gap:16px; margin-top:12px}
    .meta .box{background:#f3f4f6; padding:10px 12px; border-radius:6px}
    .meta .box b{display:block}

    .summary{display:flex; justify-content:space-between; gap:12px; margin:20px 0}
    .summary .item{flex:1; background:linear-gradient(180deg,#fff,#fbfbfd); border:1px solid #eef0f3; padding:14px; border-radius:8px}
    .summary .item h3{margin:0 0 6px 0; font-size:13px; color:#666}
    .summary .amount{font-size:18px; font-weight:700}

    table{width:100%; border-collapse:collapse; margin-top:14px}
    thead th{background:#f9fafb; text-align:left; padding:10px 12px; font-size:13px; color:#444; border-bottom:1px solid #eceef2}
    tbody td{padding:10px 12px; border-bottom:1px dashed #e9ecef; font-size:13px; color:#333}
    tbody tr:last-child td{border-bottom:none}

    tfoot td{padding:12px; font-weight:700}

    .right{text-align:right}

    @media print{
      body{background:transparent}
      .card{box-shadow:none; margin:0}
    }

    .muted{color:#6b7280}
    .small{font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="brand" id="brandSVG">
        <!-- Logo will be injected here -->
      </div>

      <div class="company-info">
        <h1 id="companyName"></h1>
        <p class="muted" id="companyAddress"></p>
        <p class="muted" id="companyDetails"></p>

        <div class="meta">
          <div class="box">
            <span class="small muted">Estado</span>
            <b id="accountStatus"></b>
          </div>
          <div class="box">
            <span class="small muted">Periodo</span>
            <b id="period"></b>
          </div>
          <div class="box">
            <span class="small muted">Fecha emisión</span>
            <b id="issueDate"></b>
          </div>
        </div>
      </div>

      <div style="min-width:180px; text-align:right">
        <div class="muted small">Cuenta</div>
        <div style="font-weight:700; font-size:18px" id="accountNumber"></div>
        <div class="muted small" style="margin-top:8px">Cliente</div>
        <div style="font-weight:600" id="clientName"></div>
        <div class="muted small" id="clientIdentifier"></div>
      </div>
    </header>

    <section class="summary">
      <div class="item">
        <h3>Precio Final</h3>
        <div class="amount" id="precioFinal"></div>
      </div>
      <div class="item">
        <h3>Total Pagado</h3>
        <div class="amount" id="totalPagado"></div>
      </div>
      <div class="item">
        <h3>Multas</h3>
        <div class="amount" id="totalMultas"></div>
      </div>
      <div class="item">
        <h3>Saldo Pendiente</h3>
        <div class="amount" id="saldoPendiente"></div>
      </div>
    </section>

    <section>
      <h2 style="margin:0 0 8px 0; font-size:16px">Acuerdos de Pago</h2>
      <table>
        <thead>
          <tr>
            <th>Orden</th>
            <th>Concepto</th>
            <th>Fecha Programada</th>
            <th class="right">Monto</th>
            <th class="right">Pagado</th>
            <th class="right">Pendiente</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="acuerdosTable">
        </tbody>
      </table>
    </section>

    <section style="margin-top:20px">
      <h2 style="margin:0 0 8px 0; font-size:16px">Pagos Realizados</h2>
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Método</th>
            <th>Referencia</th>
            <th class="right">Monto</th>
          </tr>
        </thead>
        <tbody id="pagosTable">
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3">Total Pagos</td>
            <td class="right" id="totalPagosFooter"></td>
          </tr>
        </tfoot>
      </table>
    </section>

    <footer style="margin-top:18px; font-size:13px; color:#555">
      <div class="muted small">Notas:</div>
      <div class="small" id="notes"></div>
    </footer>
  </div>
</body>
</html>
